spring:
  application:
    name: auth-service

server:
  port: 8086

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:defaultSecretKey123}
  expiration: ${JWT_EXPIRATION:3600000}